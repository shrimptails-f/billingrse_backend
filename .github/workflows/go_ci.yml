name: Go CI

on:
  push:

jobs:
  build-test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: password
          MYSQL_DATABASE: test
        ports:
          - 3306:3306 # ローカルで3306被りやすいので避ける
        options: >-
          --health-cmd="mysqladmin ping --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      APP: ci
      IS_HIDDEN_SQL: true
      IS_HIDDEN_TEST_SQL: true
      # AI APIの暗号化キー素材
      AGENT_TOKEN_KEY_V1: "9d64a1ec0d7bb5f1c4a7322ed1e4396b9d64a1ec0d7bb5f1c4a7322ed1e4396b" # 32バイト以上必須
      AGENT_TOKEN_SALT: "ad7b2f3a9e5c41d28713ff9520c6e471"
      #
      EMAIL_TOKEN_KEY_V1: "your-32-byte-or-longer-email-key-here-change-this-in-production"
      EMAIL_TOKEN_SALT: "your-random-email-salt-value-here-change-this"
      EMAIL_GMAIL_CLIENT_SECRET_PATH: "/home/dev/backend/client_secret.json"
      EMAIL_GMAIL_REDIRECT_URL: "http://localhost:8080/email/credentials/gmail/oauth/callback"
      EMAIL_GMAIL_STATE_TTL_SECONDS: 600
      # DB設定
      MYSQL_USER: root
      MYSQL_PASSWORD: password
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      MYSQL_DATABASE: development
      MYSQL_TEST_DATABASE: test
      # JWT設定
      JWT_SECRET_KEY: your_jwt_secret_key_here
      # アプリケーション設定
      APP_NAME: Gmail Auth App
      LOG_LEVEL: info
      GO_PORT: 8080
      REMOTE_CONTAINER_PORT: 5994
      GO_DEBUG_PORT: 2345
    strategy:
      matrix:
        go-version: [1.25]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: ${{ matrix.go-version }}

    - name: Download dependencies
      run: go mod download

    - name: Build application
      run: |
        go build -v -o app ./cmd/app
        go install ./...

    - name: Run go vet
      run: go vet ./...

    - name: Run internal tests
      run: go test -race ./internal/...

    - name: Run scenario tests
      run: go test -race ./test/scenario/...

  lint:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: [1.25]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: ${{ matrix.go-version }}

    - name: Download dependencies
      run: go mod download

    - name: Install golangci-lint
      run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.11.3

    - name: Run golangci-lint
      run: |
        rm -f "${GITHUB_WORKSPACE}/custom-gcl"
        cd tools/diinterfacecheck && "$(go env GOPATH)/bin/golangci-lint" custom --name custom-gcl --destination "${GITHUB_WORKSPACE}"
        "${GITHUB_WORKSPACE}/custom-gcl" run ./internal/...
