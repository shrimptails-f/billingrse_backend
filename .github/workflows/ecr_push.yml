name: Push Backend Image

permissions:
  id-token: write
  contents: read

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Docker image tag (default: commit SHA)'
        required: false
        default: ''

jobs:
  test:
    name: Run Go tests
    runs-on: ubuntu-latest
    environment: dev
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: password
          MYSQL_DATABASE: test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    env:
      APP: ci
      IS_HIDDEN_SQL: true
      IS_HIDDEN_TEST_SQL: true
      SMTP_HOST: mailhog
      SMTP_PORT: 1025
      EMAIL_FROM_ADDRESS: no-reply@local.auth.example.com
      # AI APIの暗号化キー素材
      AGENT_TOKEN_KEY_V1: "9d64a1ec0d7bb5f1c4a7322ed1e4396b9d64a1ec0d7bb5f1c4a7322ed1e4396b" # 32バイト以上必須
      AGENT_TOKEN_SALT: "ad7b2f3a9e5c41d28713ff9520c6e471"
      OPENAI_API_KEY: "dummy-openai-api-key"
      #
      EMAIL_TOKEN_KEY_V1: "your-32-byte-or-longer-email-key-here-change-this-in-production"
      EMAIL_TOKEN_SALT: "your-random-email-salt-value-here-change-this"
      EMAIL_GMAIL_CLIENT_ID: "dummy-gmail-client-id"
      EMAIL_GMAIL_CLIENT_SECRET: "dummy-gmail-client-secret"
      EMAIL_GMAIL_CLIENT_SECRET_PATH: "/home/dev/backend/client_secret.json"
      EMAIL_GMAIL_REDIRECT_URL: "http://localhost:8080/email/credentials/gmail/oauth/callback"
      EMAIL_GMAIL_STATE_TTL_SECONDS: 600
      EMAIL_GMAIL_REFRESH_SKEW_SECONDS: 600
      EMAIL_VERIFICATION_BASE_URL: "http://localhost:3000/auth/verify"
      FRONT_DOMAIN: "http://localhost:3000"
      JWT_EXPIRES_IN: "24h"
      # DB設定
      MYSQL_USER: root
      MYSQL_PASSWORD: password
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      MYSQL_DATABASE: development
      MYSQL_TEST_DATABASE: test
      # Redis設定
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 0
      REDIS_PASSWORD: redis_local_password
      RATE_LIMIT_SCRIPT_PATH: "internal/library/redis/script/scripts/rate_limit.lua"
      # JWT設定
      JWT_SECRET_KEY: your_jwt_secret_key_here
      # アプリケーション設定
      APP_NAME: Gmail Auth App
      LOG_LEVEL: info
      GO_PORT: 8080
      REMOTE_CONTAINER_PORT: 5994
      GO_DEBUG_PORT: 2345
    strategy:
      matrix:
        go-version: [1.25]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
      - name: Download dependencies
        run: go mod download
      - name: Run go vet
        run: go vet ./...
      - name: Run tests
        run: go test -v -race ./...

  push:
    name: Build and push runtime image
    runs-on: ubuntu-latest
    needs: test
    environment: dev
    env:
      AWS_REGION: ap-northeast-1
      APP_ROOT: /home/dev/backend
      ECR_REPOSITORY: billingrse-dev-backend
      IMAGE_NAME: billingrse-dev-backend
      IMAGE_TAG: ${{ github.event.inputs.image_tag || github.sha }}
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Ensure ECR repository exists
        run: |
          aws ecr describe-repositories --repository-names "${ECR_REPOSITORY}" >/dev/null 2>&1 || \
          aws ecr create-repository --repository-name "${ECR_REPOSITORY}"

      - name: Build runtime image
        run: |
          docker build \
            --build-arg APP_ROOT=${APP_ROOT} \
            --target runtime \
            -t ${IMAGE_NAME}:${IMAGE_TAG} \
            -f deploy/Dockerfile .

      - name: Tag image for ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker tag ${IMAGE_NAME}:${IMAGE_TAG} ${ECR_REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}

      - name: Push image to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker push ${ECR_REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}
