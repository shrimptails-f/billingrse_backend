name: Push Migration Image

permissions:
  id-token: write
  contents: read

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Docker image tag (default: commit SHA)'
        required: false
        default: ''

jobs:
  push-migration:
    name: Build and push DB migration image
    runs-on: ubuntu-latest
    environment: dev
    env:
      AWS_REGION: ap-northeast-1
      ECR_REPOSITORY: billingrse-dev-db-tools
      IMAGE_NAME: billingrse-dev-db-tools
      IMAGE_TAG: ${{ github.event.inputs.image_tag || github.sha }}
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Ensure ECR repository exists
        run: |
          aws ecr describe-repositories --repository-names "${ECR_REPOSITORY}" >/dev/null 2>&1 || \
          aws ecr create-repository --repository-name "${ECR_REPOSITORY}"

      - name: Build DB migration image
        run: |
          docker build \
            -t ${IMAGE_NAME}:${IMAGE_TAG} \
            -f deploy/db_tools/Dockerfile .

      - name: Tag image for ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker tag ${IMAGE_NAME}:${IMAGE_TAG} ${ECR_REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}

      - name: Push image to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker push ${ECR_REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}
