# Migration タスクを手動で実行するワークフロー。
# 毎回 db-tools イメージをビルド/プッシュし、指定タグで migration を実行する。
name: Run DB Migration Task

permissions:
  id-token: write
  contents: read

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "db-init-toolsのイメージタグを指定してください"
        required: false
        default: ""

jobs:
  run-task:
    name: Run migration (atlas apply)
    runs-on: ubuntu-latest
    environment: dev
    env:
      AWS_REGION: ap-northeast-1
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
      STAGE: dev
      VPC_NAME: billingrse-dev-vpc
      APP_SUBNET_TAG: billingrse-dev-public-a
      APP_SECURITY_GROUP_NAME: billingrse-app
      CLUSTER_NAME: billingrse-dev-cluster
      TASK_DEFINITION_FAMILY: billingrse-dev-db-tools
      ECR_REPOSITORY: billingrse-dev-db-tools
      INPUT_IMAGE_TAG: ${{ github.event.inputs.image_tag }}
      MIGRATION_COMMAND: '["sh","-lc","atlas migrate hash --dir file://tools/migrations/ddl && atlas migrate apply --config file://atlas.hcl --env gorm"]'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Resolve image tag
        run: |
          set -euo pipefail

          if [ -n "${INPUT_IMAGE_TAG}" ]; then
            TAG="${INPUT_IMAGE_TAG}"
          else
            TAG="${GITHUB_SHA}"
          fi

          echo "IMAGE_TAG=${TAG}" >> "${GITHUB_ENV}"

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Ensure ECR repository exists
        run: |
          set -euo pipefail

          aws ecr describe-repositories --repository-names "${ECR_REPOSITORY}" >/dev/null 2>&1 || \
          aws ecr create-repository --repository-name "${ECR_REPOSITORY}"

      - name: Build DB migration image
        run: |
          set -euo pipefail

          docker build \
            -t ${ECR_REPOSITORY}:${IMAGE_TAG} \
            -f deploy/db_tools/Dockerfile .

      - name: Tag image for ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          set -euo pipefail

          docker tag ${ECR_REPOSITORY}:${IMAGE_TAG} ${ECR_REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}

      - name: Push image to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          set -euo pipefail

          docker push ${ECR_REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}

      - name: Run migration task
        run: |
          set -euo pipefail

          sanitize_error() {
            sed -E \
              -e 's/[0-9]{12}/<account-id>/g' \
              -e 's#arn:aws:[^ ]+#<arn>#g'
          }

          run_aws() {
            local out
            if ! out=$(aws "$@" 2>&1); then
              echo "${out}" | sanitize_error >&2
              return 1
            fi
            printf '%s' "${out}"
          }

          VPC_ID=$(run_aws ec2 describe-vpcs \
            --region "${AWS_REGION}" \
            --filters Name=tag:Name,Values="${VPC_NAME}" \
                      Name=tag:Stage,Values="${STAGE}" \
            --query 'Vpcs[0].VpcId' --output text)

          SUBNETS=$(run_aws ec2 describe-subnets \
            --region "${AWS_REGION}" \
            --filters Name=vpc-id,Values="${VPC_ID}" \
                      Name=tag:Name,Values="${APP_SUBNET_TAG}" \
            --query 'join(`,`, Subnets[].SubnetId)' --output text)

          APP_SG=$(run_aws ec2 describe-security-groups \
            --region "${AWS_REGION}" \
            --filters Name=vpc-id,Values="${VPC_ID}" \
                      Name=group-name,Values="${APP_SECURITY_GROUP_NAME}" \
                      Name=tag:Stage,Values="${STAGE}" \
            --query 'SecurityGroups[0].GroupId' --output text)

          if [ -z "${VPC_ID}" ] || [ "${VPC_ID}" = "None" ]; then
            echo "VPC not found"; exit 1; fi
          if [ -z "${SUBNETS}" ] || [ "${SUBNETS}" = "None" ]; then
            echo "Subnets not found"; exit 1; fi
          if [ -z "${APP_SG}" ] || [ "${APP_SG}" = "None" ]; then
            echo "App SG not found"; exit 1; fi

          echo "Starting migration task."

          OVERRIDES=$(jq -cn --argjson cmd "${MIGRATION_COMMAND}" '{containerOverrides:[{name:"db-tools",command:$cmd}]}' )
          ACCOUNT_ID=$(run_aws sts get-caller-identity --query 'Account' --output text)
          TARGET_IMAGE="${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${ECR_REPOSITORY}:${IMAGE_TAG}"

          if ! BASE_TASK_DEF=$(run_aws ecs describe-task-definition \
            --region "${AWS_REGION}" \
            --task-definition "${TASK_DEFINITION_FAMILY}" \
            --query 'taskDefinition' \
            --output json); then
            echo "Failed to describe base task definition."
            exit 1
          fi

          UPDATED_TASK_DEF=$(echo "${BASE_TASK_DEF}" | jq -c \
            --arg image "${TARGET_IMAGE}" \
            '
            .containerDefinitions = (.containerDefinitions | map(if .name == "db-tools" then .image = $image else . end))
            | del(.taskDefinitionArn, .revision, .status, .requiresAttributes, .compatibilities, .registeredAt, .registeredBy, .deregisteredAt)
            ')

          if ! RUN_TASK_DEF_ARN=$(run_aws ecs register-task-definition \
            --region "${AWS_REGION}" \
            --cli-input-json "${UPDATED_TASK_DEF}" \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text); then
            echo "Failed to register task definition."
            exit 1
          fi

          if ! TASK_ARN=$(run_aws ecs run-task \
            --region "${AWS_REGION}" \
            --cluster "${CLUSTER_NAME}" \
            --launch-type FARGATE \
            --task-definition "${RUN_TASK_DEF_ARN}" \
            --network-configuration "awsvpcConfiguration={subnets=[${SUBNETS}],securityGroups=[${APP_SG}],assignPublicIp=ENABLED}" \
            --overrides "${OVERRIDES}" \
            --query 'tasks[0].taskArn' \
            --output text); then
            echo "Failed to start migration task."
            exit 1
          fi

          if [ -z "${TASK_ARN}" ] || [ "${TASK_ARN}" = "None" ]; then
            echo "Failed to start migration task."
            exit 1
          fi

          echo "Migration task started."
